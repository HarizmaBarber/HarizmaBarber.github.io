<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0a0a" rx="40"/>
  <!-- Vintage diamond/badge -->
  <g transform="translate(200,200)">
    <rect x="-100" y="-100" width="200" height="200" fill="none" stroke="#c9a758" stroke-width="1.5" transform="rotate(45)" opacity="0.6"/>
    <rect x="-85" y="-85" width="170" height="170" fill="none" stroke="#2a2a2a" stroke-width="1" transform="rotate(45)"/>
  </g>
  <text x="200" y="140" font-family="Raleway, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="6" text-anchor="middle" fill="#666" dominant-baseline="central">EST.</text>
  <text x="200" y="175" font-size="48" text-anchor="middle" fill="#c9a758" dominant-baseline="central">✂</text>
  <text x="200" y="230" font-family="Raleway, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="6" text-anchor="middle" fill="#c9a758" dominant-baseline="central">ХАРИЗМА</text>
  <text x="200" y="265" font-family="Raleway, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="5" text-anchor="middle" fill="#888" dominant-baseline="central">БАРБЕРШОП</text>
  <text x="200" y="288" font-family="Raleway, Arial, sans-serif" font-size="10" font-weight="300" letter-spacing="3" text-anchor="middle" fill="#555" dominant-baseline="central">САМАРА</text>
</svg>
